<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVA Helpbot | Temasek Polytechnic</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div id="chat-container">
        <h2>Data Visualisation & Analytics Helpbot</h2>
        
        <div id="chat-box">
            <div class="message bot-message">
                Hello! I am your DAVA assistant. Ask me anything about SQL, Python, or Data Visualisation principles.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your data question here..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Support for "Enter" key to send
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const userText = input.value.trim();

            if (!userText) return;

            // Display User Message with the CSS class
            box.innerHTML += `<div class="message user-message">${userText}</div>`;
            
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // Create a placeholder for the bot's response
            const loadingId = 'msg-' + Date.now();
            box.innerHTML += `<div class="message bot-message" id="${loadingId}">...</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                const botMessageElement = document.getElementById(loadingId);

                // 3. Render Markdown using marked.parse()
                if (data.response) {
                    botMessageElement.innerHTML = marked.parse(data.response);
                } else {
                    botMessageElement.innerText = "Error: Received empty response.";
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById(loadingId).innerText = "Error: Could not reach server.";
            }

            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
